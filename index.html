<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Pedal Counter Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pedal Counter">
<link rel="apple-touch-icon" href="icons/Pedal Counter.png">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="navbar-left">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
      </div>
      <span class="navbar-title">Pedal Counter</span>
      <span class="navbar-subtitle">Dashboard</span>
    </div>
    <div class="navbar-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>
      <div id="clock" class="clock"></div>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">
        <!-- Moon (shown in dark mode) -->
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <!-- Sun (shown in light mode) -->
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Device 1 -->
    <div class="card card--blue">
      <div class="card-header">
        <div class="device-info">
          <div class="device-icon device-icon--blue">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
            </svg>
          </div>
          <div>
            <h2 class="device-name">Device 1</h2>
            <p class="device-id">PedalCounter_1</p>
          </div>
        </div>
        <div class="status-pill" id="statusPill1">
          <span class="status-dot" id="statusDot1"></span>
          <span id="status1">Disconnected</span>
        </div>
      </div>

      <div class="count-section">
        <div class="count-label">PEDAL COUNT</div>
        <div class="count" id="count1">0</div>
        <div class="count-unit">rotations</div>
      </div>

      <div class="btn-row">
        <button class="btn btn--primary" onclick="connectDevice1()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
          </svg>
          Connect
        </button>
        <button class="btn btn--ghost" onclick="resetDevice1()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          Reset
        </button>
      </div>

      <div class="log-section">
        <div class="log-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
          </svg>
          Activity Log
        </div>
        <div class="log" id="log1"></div>
      </div>
    </div>

    <!-- Device 2 -->
    <div class="card card--purple">
      <div class="card-header">
        <div class="device-info">
          <div class="device-icon device-icon--purple">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
            </svg>
          </div>
          <div>
            <h2 class="device-name">Device 2</h2>
            <p class="device-id">PedalCounter_2</p>
          </div>
        </div>
        <div class="status-pill" id="statusPill2">
          <span class="status-dot" id="statusDot2"></span>
          <span id="status2">Disconnected</span>
        </div>
      </div>

      <div class="count-section">
        <div class="count-label">PEDAL COUNT</div>
        <div class="count" id="count2">0</div>
        <div class="count-unit">rotations</div>
      </div>

      <div class="btn-row">
        <button class="btn btn--primary btn--purple" onclick="connectDevice2()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
          </svg>
          Connect
        </button>
        <button class="btn btn--ghost" onclick="resetDevice2()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          Reset
        </button>
      </div>

      <div class="log-section">
        <div class="log-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
          </svg>
          Activity Log
        </div>
        <div class="log" id="log2"></div>
      </div>
    </div>

  </main>

  <!-- Toast notification -->
  <div id="toast" class="toast" role="alert"></div>

<script src="script.js"></script>

</body>
</html>
